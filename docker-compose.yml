version: "3.9"

services:
  nginx:
    build: ./nginx
    container_name: ai_engine_nginx
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    depends_on:
      - frontend
      - backend
    networks:
      - app_network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: ai_engine_frontend
    expose:
      - "3000"
    networks:
      - app_network
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: ai_engine_backend
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
      - history_data:/app/history
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge

volumes:
  uploads_data:
  history_data:
